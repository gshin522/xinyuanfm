<script>
    const sheetId = '1Hz97SCxNiKpg6M4SAsT2zx4XyGJxzAIVHFQJfKiWPuU';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&t=${new Date().getTime()}`;

    let allActivities = [];

    function showAlert(msg) {
        document.getElementById('alertMsg').innerText = msg;
        document.getElementById('customAlert').style.display = 'flex';
    }
    function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }

    async function init() {
        try {
            const resp = await fetch(csvUrl);
            const text = await resp.text();
            
            // 使用更强大的 CSV 解析逻辑，防止内容里的逗号干扰
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            
            allActivities = lines.slice(1).map(line => {
                // 这个正则可以正确处理带引号的 CSV 字段
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                return {
                    name: cols[0],       // A: 活动名称
                    desc: cols[1],       // B: 简介
                    org: cols[2],        // C: 主办单位
                    startDate: cols[3],  // D: 日期开始 (30/06/2026)
                    endDate: cols[4],    // E: 日期结束
                    startTime: cols[5],  // F: 时间开始
                    endTime: cols[6],    // G: 时间结束
                    location: cols[7],   // H: 地点
                    state: cols[8],      // I: 州属
                    fee: cols[9],        // J: 费用
                    contact: cols[10],   // K: 负责人
                    phone: cols[11],     // L: 联络方式
                    // M, N, O 暂时跳过
                    status: cols[15],    // P: 审批状态 (第 16 列，索引是 15)
                    poster: cols[16] || "" // Q: 海报链接 (第 17 列，索引是 16)
                };
            }).filter(a => a.status === "通过" || a.status === "已通过");

            renderList(allActivities);
        } catch (e) {
            showAlert("活动资料调取失败，请检查网络。");
        }
    }

    function renderList(data) {
        const listBody = document.getElementById('listBody');
        listBody.innerHTML = "";

        if (data.length === 0) {
            listBody.innerHTML = '<p style="text-align: center; color: white; padding: 20px;">暂无已通过审核的活动。</p>';
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'activity-card';
            card.onclick = () => showDetail(item);
            card.innerHTML = `
                <div class="card-date">${item.startDate}</div>
                <div class="card-title">${item.name}</div>
                <div class="card-info">
                    <span class="state-tag">${item.state}</span>
                    <span>${item.org}</span>
                </div>
            `;
            listBody.appendChild(card);
        });
    }

    function filterData() {
        const state = document.getElementById('stateFilter').value;
        const month = document.getElementById('monthFilter').value;

        const filtered = allActivities.filter(a => {
            const matchState = state === "" || a.state === state;
            
            // 兼容 30/06/2026 格式提取月份
            let m = "";
            if (a.startDate && a.startDate.includes('/')) {
                m = a.startDate.split('/')[1]; // 拿到 06
            } else if (a.startDate && a.startDate.includes('-')) {
                m = a.startDate.split('-')[1]; // 拿到 06
            }
            
            const matchMonth = month === "" || m === month;
            return matchState && matchMonth;
        });
        renderList(filtered);
    }

    function showDetail(item) {
        const poster = document.getElementById('posterImg');
        if (item.poster) {
            let id = "";
            if (item.poster.includes('/d/')) id = item.poster.split('/d/')[1].split('/')[0];
            else if (item.poster.includes('id=')) id = item.poster.split('id=')[1].split('&')[0];
            poster.src = id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1000` : item.poster;
            poster.style.display = 'block';
        } else {
            poster.style.display = 'none';
        }

        document.getElementById('detailBody').innerHTML = `
            <div class="detail-title">${item.name}</div>
            <div class="detail-item"><b>主办单位：</b>${item.org}</div>
            <div class="detail-item"><b>日期：</b>${item.startDate} 至 ${item.endDate}</div>
            <div class="detail-item"><b>时间：</b>${item.startTime} - ${item.endTime}</div>
            <div class="detail-item"><b>地点：</b>${item.location} (${item.state})</div>
            <div class="detail-item"><b>费用：</b>${item.fee}</div>
            <div class="detail-item"><b>联络人：</b>${item.contact} (${item.phone})</div>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">
            <div class="detail-item"><b>简介：</b><br>${item.desc}</div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    init();
</script>
